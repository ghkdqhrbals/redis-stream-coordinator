openapi: 3.1.0
info:
  title: Redis Stream Coordinator API
  version: v1
  summary: Control-plane API for Redis Stream shard coordination.
  description: |
    Redis Stream Coordinator provides a coordinator-managed control plane for sharded Redis Stream workloads.
    The API creates stream groups, returns producer routing metadata, accepts consumer heartbeats, manages
    resharding, and exposes monitoring data for dashboards and operators.

    The project exists because Redis Stream by itself does not provide a broker-side group coordinator,
    cluster-aware stream sharding, or a built-in way to prevent one stream key from becoming a BigKey.
    Redis Cluster distributes keys by hash slot, so a single stream key can still concentrate memory and write
    traffic on one node. This API treats a logical stream as multiple physical shard stream keys and lets a
    dedicated coordinator own the assignment protocol.
servers:
  - url: https://coordinator.ghkdqhrbals.org
    description: Public coordinator HTTPS endpoint.
  - url: http://localhost:8080
    description: Local coordinator server.
tags:
  - name: Authentication
    description: Token issuing endpoint for coordinator API callers.
  - name: Groups
    description: Group metadata lifecycle and read-only group state.
  - name: Producer Routing
    description: Metadata used by producers to route partition keys to Redis Stream shard keys.
  - name: Resharding
    description: Shard count changes and rollback operations.
  - name: Members
    description: Consumer runtime heartbeat and assignment reconciliation.
  - name: Monitoring
    description: Operator-facing group, member, assignment, offset, message, and health APIs.
  - name: Grafana
    description: JSON endpoints shaped for Grafana dashboard variables and table panels.
security:
  - bearerAuth: []
  - basicAuth: []
paths:
  /coord/v1/auth/login:
    post:
      tags: [Authentication]
      operationId: loginCoordinatorApi
      summary: Issue coordinator API token.
      description: Authenticates a configured coordinator user and returns a signed Bearer token. The default token lifetime is seven days.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              admin:
                value:
                  username: admin
                  password: password
      responses:
        "200":
          description: Bearer token issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials.

  /coord/v1/streams/{streamPrefix}:
    parameters:
      - $ref: "#/components/parameters/streamPrefix"
    post:
      tags: [Groups]
      operationId: createStreamGroup
      summary: Create a stream group.
      description: |
        Creates the initial shard layout for a sharded Redis Stream prefix. The official create path only
        requires `streamPrefix`; consumer groups reconcile through their own runtime configuration and heartbeat flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStreamRequest"
            examples:
              create:
                value:
                  initialShardCount: 20
                  requestedBy: operator@example.com
                  reason: bootstrap create-order stream
      responses:
        "201":
          description: Stream shard layout was created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamCreateResponse"
        "409":
          description: Stream prefix already has coordinator metadata or Redis Stream keys.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coord/v1/streams/{streamPrefix}/groups/{consumerGroup}:
    parameters:
      - $ref: "#/components/parameters/streamPrefix"
      - $ref: "#/components/parameters/consumerGroup"
    post:
      tags: [Groups]
      operationId: createCoordinatorGroup
      summary: Compatibility: create one consumer group metadata.
      description: Compatibility endpoint for older clients that created metadata with `consumerGroup` in the path. Operators should prefer POST /coord/v1/streams/{streamPrefix}.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"
            examples:
              create:
                value:
                  initialShardCount: 20
                  requestedBy: operator@example.com
                  reason: bootstrap create-order stream group
      responses:
        "201":
          description: Group was created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "409":
          description: Group already exists, or the first group for this prefix would collide with existing Redis Stream keys.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags: [Groups]
      operationId: getCoordinatorGroup
      summary: Read coordinator group metadata.
      description: Returns the coordinator source-of-truth view for one group.
      responses:
        "200":
          description: Group metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Groups]
      operationId: deleteCoordinatorGroup
      summary: Delete an inactive coordinator group.
      description: Deletes coordinator metadata. Use force only for recovery when members cannot gracefully leave.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteGroupRequest"
      responses:
        "200":
          description: Deleted group metadata snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "422":
          $ref: "#/components/responses/Unprocessable"

  /coord/v1/streams/{streamPrefix}/groups/{consumerGroup}/producer-routing:
    parameters:
      - $ref: "#/components/parameters/streamPrefix"
      - $ref: "#/components/parameters/consumerGroup"
    get:
      tags: [Producer Routing]
      operationId: getProducerRoutingMetadata
      summary: Read producer routing metadata.
      description: |
        Returns the shard count, stream key pattern, concrete shard keys, and Redis Cluster slots that producers
        must use for partition-key routing. The same partition key can route to a different shard after shard count
        changes, so duplicate-sensitive workloads should quiesce producers before resharding.
      responses:
        "200":
          description: Producer routing metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerRoutingResponse"

  /coord/v1/streams/{streamPrefix}/scale:
    parameters:
      - $ref: "#/components/parameters/streamPrefix"
    post:
      tags: [Resharding]
      operationId: scaleStreamShards
      summary: Start shard scale-out or scale-in.
      description: |
        Changes the physical shard count for every coordinator group registered under the stream prefix.
        Consumer groups are intentionally not part of this path. Each affected group receives the new
        assignment plan on the next consumer heartbeat and reconciles ownership independently.
        During scale-in, removed shard streams are retired only after live owners release them or expire
        and every Redis consumer group on removed shards reports pending=0 and known lag=0.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScaleStreamRequest"
            examples:
              scaleOut:
                value:
                  targetShardCount: 20
                  requestedBy: operator@example.com
                  reason: distribute create-order stream load
      responses:
        "202":
          description: Stream-level resharding was accepted for affected consumer groups.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamScaleResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /coord/v1/streams/{streamPrefix}/groups/{consumerGroup}/scale:
    parameters:
      - $ref: "#/components/parameters/streamPrefix"
      - $ref: "#/components/parameters/consumerGroup"
    post:
      tags: [Resharding]
      operationId: startGroupResharding
      summary: Compatibility: scale one consumer group.
      description: |
        Compatibility endpoint for a single consumer group. Operators should prefer
        POST /coord/v1/streams/{streamPrefix}/scale so the stream shard count changes consistently
        across registered groups. During scale-in, if every live member expires, the coordinator skips
        consumer-level revoke wait and completes only after Redis reports removed shard consumer groups
        are drained.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScaleGroupRequest"
            examples:
              scaleOut:
                value:
                  targetShardCount: 20
                  requestedBy: operator@example.com
                  reason: distribute create-order stream load
      responses:
        "202":
          description: Resharding was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Migration"
        "409":
          $ref: "#/components/responses/Conflict"

  /coord/v1/streams/{streamPrefix}/groups/{consumerGroup}/migrations/{reshardingId}:
    parameters:
      - $ref: "#/components/parameters/streamPrefix"
      - $ref: "#/components/parameters/consumerGroup"
      - $ref: "#/components/parameters/reshardingId"
    get:
      tags: [Resharding]
      operationId: getReshardingMigration
      summary: Read one resharding operation.
      responses:
        "200":
          description: Resharding metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Migration"

  /coord/v1/streams/{streamPrefix}/groups/{consumerGroup}/migrations/{reshardingId}/rollback:
    parameters:
      - $ref: "#/components/parameters/streamPrefix"
      - $ref: "#/components/parameters/consumerGroup"
      - $ref: "#/components/parameters/reshardingId"
    post:
      tags: [Resharding]
      operationId: rollbackReshardingMigration
      summary: Request rollback for an active resharding operation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RollbackMigrationRequest"
      responses:
        "202":
          description: Rollback was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Migration"

  /coord/v1/streams/{streamPrefix}/groups/{consumerGroup}/members/{memberId}/heartbeat:
    parameters:
      - $ref: "#/components/parameters/streamPrefix"
      - $ref: "#/components/parameters/consumerGroup"
      - $ref: "#/components/parameters/memberId"
    post:
      tags: [Members]
      operationId: sendConsumerHeartbeat
      summary: Send consumer liveness and ownership report.
      description: |
        Consumer runtimes periodically report their member epoch, local metadata version, current shard ownership,
        revoking shards, runtime worker capacity, and consumption progress. The coordinator returns the authoritative
        assignment state. Heartbeat handling is idempotent for the same member state and may return SYNC_METADATA,
        REVOKE_PENDING, OK, RETRY, or fencing responses.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatRequest"
      responses:
        "200":
          description: Heartbeat decision and target assignment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeartbeatResponse"

  /coord/v1/monitoring/session:
    get:
      tags: [Monitoring]
      operationId: getMonitoringSession
      summary: Read authenticated monitoring session.
      responses:
        "200":
          description: Current session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringSessionResponse"

  /coord/v1/monitoring/health:
    get:
      tags: [Monitoring]
      operationId: getCoordinatorHealth
      summary: Read current coordinator health.
      responses:
        "200":
          description: Coordinator, Redis, and event-loop health.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /coord/v1/monitoring/compatibility:
    get:
      tags: [Monitoring]
      operationId: getCoordinatorCompatibility
      summary: Read coordinator compatibility metadata.
      description: Returns the supported coordinator/client module version range.
      responses:
        "200":
          description: Compatibility metadata.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /coord/v1/monitoring/groups:
    get:
      tags: [Monitoring]
      operationId: listCoordinatorGroups
      summary: List all coordinator groups.
      responses:
        "200":
          description: Group list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: "#/components/schemas/GroupResponse"

  /coord/v1/monitoring/streams/{streamPrefix}/groups/{consumerGroup}:
    parameters:
      - $ref: "#/components/parameters/streamPrefix"
      - $ref: "#/components/parameters/consumerGroup"
    get:
      tags: [Monitoring]
      operationId: getMonitoringGroup
      summary: Read one group monitoring summary.
      responses:
        "200":
          description: Group monitoring summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"

  /coord/v1/monitoring/streams/{streamPrefix}/groups/{consumerGroup}/members:
    parameters:
      - $ref: "#/components/parameters/streamPrefix"
      - $ref: "#/components/parameters/consumerGroup"
    get:
      tags: [Monitoring]
      operationId: listGroupMembers
      summary: List member runtime state.
      responses:
        "200":
          description: Member states.
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/MemberMetadata"

  /coord/v1/monitoring/streams/{streamPrefix}/groups/{consumerGroup}/assignments:
    parameters:
      - $ref: "#/components/parameters/streamPrefix"
      - $ref: "#/components/parameters/consumerGroup"
    get:
      tags: [Monitoring]
      operationId: getGroupAssignments
      summary: Read target, current, and revoking assignments.
      responses:
        "200":
          description: Assignment reconciliation state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentsResponse"

  /coord/v1/monitoring/streams/{streamPrefix}/groups/{consumerGroup}/consumption:
    parameters:
      - $ref: "#/components/parameters/streamPrefix"
      - $ref: "#/components/parameters/consumerGroup"
    get:
      tags: [Monitoring]
      operationId: getConsumptionProgress
      summary: Read consumer progress by shard.
      responses:
        "200":
          description: Last delivered, last acknowledged, pending count, and update time per shard owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsumptionProgressResponse"

  /coord/v1/monitoring/streams/{streamPrefix}/groups/{consumerGroup}/migrations:
    parameters:
      - $ref: "#/components/parameters/streamPrefix"
      - $ref: "#/components/parameters/consumerGroup"
    get:
      tags: [Monitoring]
      operationId: listReshardingMigrations
      summary: List resharding operations for a group.
      responses:
        "200":
          description: Resharding list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationsResponse"

  /coord/v1/monitoring/streams/{streamPrefix}/groups/{consumerGroup}/offsets:
    parameters:
      - $ref: "#/components/parameters/streamPrefix"
      - $ref: "#/components/parameters/consumerGroup"
    get:
      tags: [Monitoring]
      operationId: getStreamShardOffsets
      summary: Read Redis Stream offset, lag, and memory data by shard.
      description: Lag can be null when Redis cannot calculate it, for example when entries-read tracking is unavailable or invalid for the consumer group.
      responses:
        "200":
          description: Shard offset summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamShardOffsetsResponse"

  /coord/v1/monitoring/streams/{streamPrefix}/groups/{consumerGroup}/shards/{shardIndex}/messages:
    parameters:
      - $ref: "#/components/parameters/streamPrefix"
      - $ref: "#/components/parameters/consumerGroup"
      - $ref: "#/components/parameters/shardIndex"
      - $ref: "#/components/parameters/messageDirection"
      - $ref: "#/components/parameters/messageCursor"
      - $ref: "#/components/parameters/messageLimit"
    get:
      tags: [Monitoring]
      operationId: getStreamShardMessages
      summary: Page Redis Stream messages for one shard.
      description: Reads message payloads from Redis for debugging and dashboard drill-down.
      responses:
        "200":
          description: Cursor-based page of messages.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamMessagesPageResponse"

  /coord/v1/monitoring/grafana/groups:
    get:
      tags: [Grafana]
      operationId: listGrafanaGroups
      summary: Grafana-ready group rows.
      responses:
        "200":
          description: Group table rows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrafanaGroupRow"

  /coord/v1/monitoring/grafana/options/streams:
    get:
      tags: [Grafana]
      operationId: listGrafanaStreamOptions
      summary: Grafana variable options for stream prefixes.
      responses:
        "200":
          $ref: "#/components/responses/GrafanaOptions"

  /coord/v1/monitoring/grafana/options/consumer-groups:
    get:
      tags: [Grafana]
      operationId: listGrafanaConsumerGroupOptions
      summary: Grafana variable options for consumer groups.
      parameters:
        - name: streamPrefix
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/GrafanaOptions"

  /coord/v1/monitoring/grafana/options/shards:
    get:
      tags: [Grafana]
      operationId: listGrafanaShardOptions
      summary: Grafana variable options for shard selectors.
      parameters:
        - $ref: "#/components/parameters/queryStreamPrefix"
        - $ref: "#/components/parameters/queryConsumerGroup"
      responses:
        "200":
          $ref: "#/components/responses/GrafanaOptions"

  /coord/v1/monitoring/grafana/members:
    get:
      tags: [Grafana]
      operationId: listGrafanaMemberRows
      summary: Grafana-ready member rows.
      parameters:
        - $ref: "#/components/parameters/queryStreamPrefix"
        - $ref: "#/components/parameters/queryConsumerGroup"
      responses:
        "200":
          description: Member rows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrafanaMemberRow"

  /coord/v1/monitoring/grafana/shards:
    get:
      tags: [Grafana]
      operationId: listGrafanaShardRows
      summary: Grafana-ready shard offset rows.
      parameters:
        - $ref: "#/components/parameters/queryStreamPrefix"
        - $ref: "#/components/parameters/queryConsumerGroup"
      responses:
        "200":
          description: Shard rows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrafanaShardRow"

  /coord/v1/monitoring/grafana/assignments:
    get:
      tags: [Grafana]
      operationId: listGrafanaAssignmentRows
      summary: Grafana-ready assignment rows.
      parameters:
        - $ref: "#/components/parameters/queryStreamPrefix"
        - $ref: "#/components/parameters/queryConsumerGroup"
      responses:
        "200":
          description: Assignment rows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrafanaAssignmentRow"

  /coord/v1/monitoring/grafana/messages:
    get:
      tags: [Grafana]
      operationId: listGrafanaMessageRows
      summary: Grafana-ready message rows.
      parameters:
        - $ref: "#/components/parameters/queryStreamPrefix"
        - $ref: "#/components/parameters/queryConsumerGroup"
        - name: shardIndex
          in: query
          required: false
          schema:
            type: string
            default: "0"
          description: A numeric shard index or ALL.
        - $ref: "#/components/parameters/messageDirection"
        - $ref: "#/components/parameters/messageCursor"
        - $ref: "#/components/parameters/messageLimit"
      responses:
        "200":
          description: Message rows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrafanaMessageRow"

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: HMAC-SHA256
  parameters:
    streamPrefix:
      name: streamPrefix
      in: path
      required: true
      schema:
        type: string
      description: Sharded Redis Stream prefix managed by the coordinator. Physical stream keys are built as `{streamPrefix}:{shardIndex}`.
    consumerGroup:
      name: consumerGroup
      in: path
      required: true
      schema:
        type: string
      description: Redis Stream consumer group name.
    memberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
      description: Runtime-generated member id. The Spring Boot starter derives it from pod IP context by default.
    reshardingId:
      name: reshardingId
      in: path
      required: true
      schema:
        type: string
      description: Coordinator-generated resharding id.
    shardIndex:
      name: shardIndex
      in: path
      required: true
      schema:
        type: integer
        minimum: 0
      description: Zero-based shard index.
    queryStreamPrefix:
      name: streamPrefix
      in: query
      required: true
      schema:
        type: string
      description: Sharded Redis Stream prefix used to build physical stream keys such as create-order:4.
    queryConsumerGroup:
      name: consumerGroup
      in: query
      required: true
      schema:
        type: string
      description: Logical consumer group.
    messageDirection:
      name: direction
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/StreamMessagePageDirection"
        default: BACKWARD
      description: Page direction. BACKWARD reads newest records first.
    messageCursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Cursor returned by the previous page.
    messageLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 25
      description: Maximum records to return.
  responses:
    Conflict:
      description: The request conflicts with current coordinator metadata.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Requested group, member, or migration was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unprocessable:
      description: Request is syntactically valid but not allowed in the current group state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    GrafanaOptions:
      description: Grafana variable options.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/GrafanaOptionRow"
  schemas:
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresAt:
          type: string
          format: date-time
        expiresInSeconds:
          type: integer
          format: int64
          example: 604800
        roles:
          type: array
          items:
            type: string
    CreateGroupRequest:
      type: object
      required: [requestedBy]
      properties:
        initialShardCount:
          type: integer
          minimum: 1
        requestedBy:
          type: string
        reason:
          type: string
          nullable: true
    CreateStreamRequest:
      type: object
      required: [requestedBy]
      properties:
        initialShardCount:
          type: integer
          minimum: 1
        requestedBy:
          type: string
        reason:
          type: string
          nullable: true
    StreamCreateResponse:
      type: object
      required: [streamPrefix, shardCount, metadataVersion]
      properties:
        streamPrefix:
          type: string
        shardCount:
          type: integer
          minimum: 1
        metadataVersion:
          type: integer
          format: int64
    DeleteGroupRequest:
      type: object
      required: [requestedBy, reason]
      properties:
        requestedBy:
          type: string
        reason:
          type: string
        force:
          type: boolean
          default: false
    ScaleGroupRequest:
      type: object
      required: [targetShardCount, requestedBy, reason]
      properties:
        targetShardCount:
          type: integer
          minimum: 0
          description: Target physical shard count. Zero drains and removes every shard. Scale-in completes only after live owners release or expire and Redis reports removed shard consumer groups are drained.
        requestedBy:
          type: string
        reason:
          type: string
        deprecatedAfter:
          type: string
          nullable: true
    ScaleStreamRequest:
      type: object
      required: [targetShardCount, requestedBy, reason]
      properties:
        targetShardCount:
          type: integer
          minimum: 0
          description: Target physical shard count. Zero drains and removes every shard. Scale-in completes only after live owners release or expire and Redis reports removed shard consumer groups are drained.
        requestedBy:
          type: string
        reason:
          type: string
        deprecatedAfter:
          type: string
          nullable: true
    StreamScaleResponse:
      type: object
      required: [streamPrefix, targetShardCount, affectedConsumerGroups, migrations]
      properties:
        streamPrefix:
          type: string
        targetShardCount:
          type: integer
        affectedConsumerGroups:
          type: array
          items:
            type: string
        migrations:
          type: array
          items:
            $ref: "#/components/schemas/Migration"
    RollbackMigrationRequest:
      type: object
      required: [requestedBy, reason]
      properties:
        requestedBy:
          type: string
        reason:
          type: string
    GroupResponse:
      type: object
      required:
        - streamPrefix
        - consumerGroup
        - state
        - groupEpoch
        - assignmentEpoch
        - metadataVersion
        - shardCount
      properties:
        streamPrefix:
          type: string
        consumerGroup:
          type: string
        state:
          $ref: "#/components/schemas/GroupState"
        groupEpoch:
          type: integer
          format: int64
        assignmentEpoch:
          type: integer
          format: int64
        metadataVersion:
          type: integer
          format: int64
        shardCount:
          type: integer
        activeMigration:
          oneOf:
            - $ref: "#/components/schemas/Migration"
            - type: "null"
        targetAssignmentSummary:
          type: object
          additionalProperties:
            type: integer
        currentAssignmentSummary:
          type: object
          additionalProperties:
            type: integer
    ProducerRoutingResponse:
      type: object
      properties:
        streamPrefix:
          type: string
        consumerGroup:
          type: string
        metadataVersion:
          type: integer
          format: int64
        shardCount:
          type: integer
        streamKeyPattern:
          type: string
          example: create-order:{shardIndex}
        shards:
          type: array
          items:
            $ref: "#/components/schemas/ProducerRoutingShard"
    ProducerRoutingShard:
      type: object
      properties:
        shardIndex:
          type: integer
        streamKey:
          type: string
        redisSlot:
          type: integer
    HeartbeatRequest:
      type: object
      required: [protocolVersion, requestId, memberId, memberEpoch, metadataVersion, runtimeConsumerCapacity]
      properties:
        protocolVersion:
          type: integer
          minimum: 1
        requestId:
          type: string
        memberId:
          type: string
        memberName:
          type: string
          nullable: true
        memberEpoch:
          type: integer
          format: int64
        metadataVersion:
          type: integer
          format: int64
        runtimeConsumerCapacity:
          $ref: "#/components/schemas/RuntimeConsumerCapacity"
        ownedShards:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ShardId"
        revokingShards:
          type: array
          items:
            $ref: "#/components/schemas/RevokingShardReport"
        shardProgress:
          type: array
          items:
            $ref: "#/components/schemas/ShardConsumptionProgress"
    HeartbeatResponse:
      type: object
      properties:
        responseTo:
          type: string
        status:
          $ref: "#/components/schemas/HeartbeatStatus"
