          type: string
        memberEpoch:
          type: integer
          format: int64
        heartbeatIntervalMs:
          type: integer
          format: int64
        rebalanceTimeoutMs:
          type: integer
          format: int64
        groupEpoch:
          type: integer
          format: int64
        assignmentEpoch:
          type: integer
          format: int64
        metadataVersion:
          type: integer
          format: int64
        assignment:
          $ref: "#/components/schemas/AssignmentView"
    AssignmentView:
      type: object
      properties:
