          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ShardId"
        pendingShards:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ShardId"
        metadataVersion:
          type: integer
          format: int64
    RuntimeConsumerCapacity:
      type: object
      properties:
