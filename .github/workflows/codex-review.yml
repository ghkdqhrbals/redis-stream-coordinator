name: Codex review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  codex:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
      review_succeeded: ${{ steps.run_codex.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Run Codex review
        id: run_codex
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: prompts/review.md
          output-file: codex-review.md
          safety-strategy: drop-sudo
          sandbox: read-only

      - name: Skip unavailable Codex review
        if: steps.run_codex.outcome == 'failure'
        run: |
          echo "::notice title=Codex review skipped::Codex review is non-blocking and was skipped because the review action failed."

  post_feedback:
    if: needs.codex.outputs.review_succeeded == 'true' && needs.codex.outputs.final_message != ''
    runs-on: ubuntu-latest
    needs: codex
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Post Codex review
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
