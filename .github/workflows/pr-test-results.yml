name: PR test results

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  test:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false

      - name: Set up Java 24
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "24"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run coordinator tests
        id: gradle_test
        shell: bash
        run: |
          set +e
          ./gradlew :coordinator-server:test :coordinator-server:build --rerun-tasks --no-daemon 2>&1 | tee gradle-test.log
          status=${PIPESTATUS[0]}
          {
            echo "exit_code=$status"
            echo "log_tail<<EOF"
            tail -n 80 gradle-test.log
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Gradle test report
        id: upload_test_report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-gradle-test-report
          path: |
            coordinator-server/build/reports/tests/test/**
            coordinator-server/build/test-results/test/TEST-*.xml
            gradle-test.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Prepare browsable Test HTML report
        id: test_report_html
        if: always()
        shell: bash
        run: |
          destination="pr-${{ github.event.pull_request.number }}/${{ github.event.pull_request.head.sha }}"
          report_dir="coordinator-server/build/reports/tests/test"
          publish_dir="public-test-report"
          gradle_report_dir="$publish_dir/gradle"

          mkdir -p "$publish_dir"
          if [ -d "$report_dir" ]; then
            mkdir -p "$gradle_report_dir"
            cp -R "$report_dir"/. "$gradle_report_dir"/
          fi

          python3 .github/scripts/generate_grouped_test_report.py \
            coordinator-server/build/test-results/test \
            "$publish_dir/index.html" \
            --gradle-report-path "gradle/index.html"

          echo "url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${destination}/index.html" >> "$GITHUB_OUTPUT"

      - name: Upload browsable Test HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-test-html-site
          path: public-test-report
          if-no-files-found: error
          retention-days: 1

      - name: Prepare PR test result comment
        if: always()
        uses: actions/github-script@v7
        env:
          TEST_EXIT_CODE: ${{ steps.gradle_test.outputs.exit_code }}
          TEST_LOG_TAIL: ${{ steps.gradle_test.outputs.log_tail }}
          TEST_REPORT_HTML_URL: ${{ steps.test_report_html.outputs.url }}
          TEST_REPORT_ARTIFACT_URL: ${{ steps.upload_test_report.outputs.artifact-url }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const marker = '<!-- pr-test-results -->';
            const exitCode = process.env.TEST_EXIT_CODE || 'unknown';
            const passed = exitCode === '0';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const canPublishPages = context.payload.pull_request.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;
            const htmlReportUrl = canPublishPages
              ? (process.env.TEST_REPORT_HTML_URL || runUrl)
              : (process.env.TEST_REPORT_ARTIFACT_URL || `${runUrl}#artifacts`);
            const gradleReportUrl = canPublishPages
              ? htmlReportUrl.replace(/index\.html$/, 'gradle/index.html')
              : (process.env.TEST_REPORT_ARTIFACT_URL || `${runUrl}#artifacts`);
            const logTail = process.env.TEST_LOG_TAIL || '(no test output captured)';
            const testResultsDir = 'coordinator-server/build/test-results/test';

            function decodeXml(value) {
              return value
                .replace(/&quot;/g, '"')
                .replace(/&apos;/g, "'")
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>')
                .replace(/&amp;/g, '&');
            }

            function attrs(tag) {
              return Object.fromEntries(
                [...tag.matchAll(/([A-Za-z_:][-A-Za-z0-9_:.]*)="([^"]*)"/g)]
                  .map(([, key, value]) => [key, decodeXml(value)])
              );
            }

            function readSuites() {
              if (!fs.existsSync(testResultsDir)) {
                return {
                  totals: { tests: 0, failures: 0, errors: 0, skipped: 0 },
                  suites: [],
                  failedCases: [],
                };
              }

              const suites = fs.readdirSync(testResultsDir)
                .filter((file) => file.startsWith('TEST-') && file.endsWith('.xml'))
                .sort()
                .map((file) => {
                  const xml = fs.readFileSync(path.join(testResultsDir, file), 'utf8');
                  const suiteAttrs = attrs(xml.match(/<testsuite\b[^>]*>/)?.[0] || '');
                  const testcases = [...xml.matchAll(/<testcase\b([^>]*)>([\s\S]*?)<\/testcase>|<testcase\b([^>]*)\/>/g)]
                    .map((match) => {
                      const testcaseAttrs = attrs(`<testcase ${match[1] || match[3] || ''}>`);
                      const body = match[2] || '';
                      const status = body.includes('<failure') ? 'failed'
                        : body.includes('<error') ? 'error'
                        : body.includes('<skipped') ? 'skipped'
                        : 'passed';
                      return {
                        className: testcaseAttrs.classname || suiteAttrs.name || file,
                        name: testcaseAttrs.name || '(unnamed scenario)',
                        status,
                      };
                    });
                  return {
                    name: suiteAttrs.name || file.replace(/^TEST-/, '').replace(/\.xml$/, ''),
                    tests: Number(suiteAttrs.tests || testcases.length || 0),
                    failures: Number(suiteAttrs.failures || 0),
                    errors: Number(suiteAttrs.errors || 0),
                    skipped: Number(suiteAttrs.skipped || 0),
                    testcases,
                  };
                });

              const totals = suites.reduce((acc, suite) => ({
                tests: acc.tests + suite.tests,
                failures: acc.failures + suite.failures,
                errors: acc.errors + suite.errors,
                skipped: acc.skipped + suite.skipped,
              }), { tests: 0, failures: 0, errors: 0, skipped: 0 });

              const failedCases = suites.flatMap((suite) =>
                suite.testcases
                  .filter((testcase) => testcase.status === 'failed' || testcase.status === 'error')
                  .map((testcase) => `${suite.name.split('.').pop()}: ${testcase.name}`)
              );

              return { totals, suites, failedCases };
            }

            const results = readSuites();
            const passCount = Math.max(
              results.totals.tests - results.totals.failures - results.totals.errors - results.totals.skipped,
              0
            );
            function countCasesByClassFragment(fragment) {
              return results.suites
                .flatMap((suite) => suite.testcases)
                .filter((testcase) => testcase.className.includes(fragment))
                .length;
            }

            const groupedWorkflowCount = countCasesByClassFragment('CoordinatorGroupedWorkflowTest');
            const rebalanceFlowCount = countCasesByClassFragment('CoordinatorRebalanceStateMachineFlowTest');
            const shortSha = context.payload.pull_request.head.sha.slice(0, 7);
            const runAttempt = process.env.GITHUB_RUN_ATTEMPT || '1';
            const resultSummary = `${passCount} passed, ${results.totals.failures} failed, ${results.totals.errors} errored, ${results.totals.skipped} skipped`;
            const groupedWorkflowSummary = groupedWorkflowCount > 0
              ? `${groupedWorkflowCount} tests`
              : 'not found';
            const rebalanceFlowSummary = rebalanceFlowCount > 0
              ? `${rebalanceFlowCount} tests`
              : 'not found';
            const body = [
              marker,
              `### Coordinator tests ${passed ? 'passed' : 'failed'}`,
              '',
              '| Check | Details |',
              '| --- | --- |',
              `| Commit | \`${shortSha}\` |`,
              `| Run attempt | ${runAttempt} |`,
              '| Command | `./gradlew :coordinator-server:test :coordinator-server:build --rerun-tasks --no-daemon` |',
              `| Result | ${resultSummary} |`,
              `| Coordinator workflow scenarios | ${groupedWorkflowSummary} |`,
              `| Rebalance state-machine scenarios | ${rebalanceFlowSummary} |`,
              `| Reports | [Workflow run](${runUrl}) / [Coordinator test report](${htmlReportUrl}) |`,
              `| Raw Gradle test report | [Open Gradle report](${gradleReportUrl}) |`,
            ];

            if (results.failedCases.length > 0) {
              body.push('', '### Failed Cases', '', ...results.failedCases.slice(0, 20).map((testcase) => `- \`${testcase}\``));
            }

            if (!passed) {
              body.push(
                '',
                '<details open>',
                '<summary>Last 80 log lines</summary>',
                '',
                '```text',
                logTail.slice(-12000),
                '```',
                '</details>',
              );
            }

            fs.mkdirSync('pr-test-result-comment', { recursive: true });
            fs.writeFileSync('pr-test-result-comment/body.md', body.join('\n'));

      - name: Upload PR test result comment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-pr-test-comment
          path: pr-test-result-comment/body.md
          if-no-files-found: error
          retention-days: 1

      - name: Fail if coordinator tests failed
        if: always()
        shell: bash
        run: |
          test "${{ steps.gradle_test.outputs.exit_code }}" = "0"

  publish_test_report:
    if: always() && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository && needs.test.result != 'skipped' && needs.test.result != 'cancelled'
    runs-on: ubuntu-latest
    needs: test
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download browsable Test HTML report
        uses: actions/download-artifact@v4
        with:
          name: coordinator-test-html-site
          path: public-test-report

      - name: Publish Test HTML report
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public-test-report
          destination_dir: pr-${{ github.event.pull_request.number }}/${{ github.event.pull_request.head.sha }}
          keep_files: true
          commit_message: "Publish PR test report for ${{ github.event.pull_request.head.sha }}"

  post_test_result:
    if: always() && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: [test, publish_test_report]
    permissions:
      actions: read
      issues: write
      pull-requests: write
    steps:
      - name: Download prepared PR test result comment
        uses: actions/download-artifact@v4
        with:
          name: coordinator-pr-test-comment
          path: pr-test-result-comment

      - name: Post PR test result
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr-test-result-comment/body.md', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
