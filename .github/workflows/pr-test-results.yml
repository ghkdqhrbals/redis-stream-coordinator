name: PR test results

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  test:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false

      - name: Set up Java 24
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "24"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run coordinator tests
        id: gradle_test
        shell: bash
        run: |
          set +e
          ./gradlew :coordinator-server:test :coordinator-server:build --no-daemon 2>&1 | tee gradle-test.log
          status=${PIPESTATUS[0]}
          {
            echo "exit_code=$status"
            echo "log_tail<<EOF"
            tail -n 80 gradle-test.log
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Gradle test report
        id: upload_test_report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-gradle-test-report
          path: |
            coordinator-server/build/reports/tests/test/**
            coordinator-server/build/test-results/test/TEST-*.xml
            gradle-test.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Prepare browsable Test HTML report
        id: test_report_html
        if: always()
        shell: bash
        run: |
          destination="pr-${{ github.event.pull_request.number }}/${{ github.event.pull_request.head.sha }}"
          report_dir="coordinator-server/build/reports/tests/test"
          publish_dir="public-test-report"

          mkdir -p "$publish_dir"
          if [ -d "$report_dir" ]; then
            cp -R "$report_dir"/. "$publish_dir"/
          else
            cat > "$publish_dir/index.html" <<'HTML'
          <!doctype html>
          <html lang="en">
            <head><meta charset="utf-8"><title>Coordinator Test Report</title></head>
            <body>
              <h1>Coordinator Test Report</h1>
              <p>No Gradle Test HTML report was produced. Check the workflow log for the failure details.</p>
            </body>
          </html>
          HTML
          fi

          echo "url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${destination}/index.html" >> "$GITHUB_OUTPUT"

      - name: Publish Test HTML report
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public-test-report
          destination_dir: pr-${{ github.event.pull_request.number }}/${{ github.event.pull_request.head.sha }}
          keep_files: true
          commit_message: "Publish PR test report for ${{ github.event.pull_request.head.sha }}"

      - name: Prepare PR test result comment
        if: always()
        uses: actions/github-script@v7
        env:
          TEST_EXIT_CODE: ${{ steps.gradle_test.outputs.exit_code }}
          TEST_LOG_TAIL: ${{ steps.gradle_test.outputs.log_tail }}
          TEST_REPORT_HTML_URL: ${{ steps.test_report_html.outputs.url }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const marker = '<!-- pr-test-results -->';
            const exitCode = process.env.TEST_EXIT_CODE || 'unknown';
            const passed = exitCode === '0';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const htmlReportUrl = process.env.TEST_REPORT_HTML_URL || runUrl;
            const logTail = process.env.TEST_LOG_TAIL || '(no test output captured)';
            const testResultsDir = 'coordinator-server/build/test-results/test';

            function decodeXml(value) {
              return value
                .replace(/&quot;/g, '"')
                .replace(/&apos;/g, "'")
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>')
                .replace(/&amp;/g, '&');
            }

            function attrs(tag) {
              return Object.fromEntries(
                [...tag.matchAll(/([A-Za-z_:][-A-Za-z0-9_:.]*)="([^"]*)"/g)]
                  .map(([, key, value]) => [key, decodeXml(value)])
              );
            }

            function scenarioRows() {
              if (!fs.existsSync(testResultsDir)) {
                return {
                  totals: { tests: 0, failures: 0, errors: 0, skipped: 0 },
                  markdown: '_No JUnit XML files were produced. The build may have failed before test execution._',
                };
              }

              const suites = fs.readdirSync(testResultsDir)
                .filter((file) => file.startsWith('TEST-') && file.endsWith('.xml'))
                .sort()
                .map((file) => {
                  const xml = fs.readFileSync(path.join(testResultsDir, file), 'utf8');
                  const suiteAttrs = attrs(xml.match(/<testsuite\b[^>]*>/)?.[0] || '');
                  const testcases = [...xml.matchAll(/<testcase\b([^>]*)>([\s\S]*?)<\/testcase>|<testcase\b([^>]*)\/>/g)]
                    .map((match) => {
                      const testcaseAttrs = attrs(`<testcase ${match[1] || match[3] || ''}>`);
                      const body = match[2] || '';
                      const status = body.includes('<failure') ? 'failed'
                        : body.includes('<error') ? 'error'
                        : body.includes('<skipped') ? 'skipped'
                        : 'passed';
                      return {
                        className: testcaseAttrs.classname || suiteAttrs.name || file,
                        name: testcaseAttrs.name || '(unnamed scenario)',
                        status,
                      };
                    });
                  return {
                    name: suiteAttrs.name || file.replace(/^TEST-/, '').replace(/\.xml$/, ''),
                    tests: Number(suiteAttrs.tests || testcases.length || 0),
                    failures: Number(suiteAttrs.failures || 0),
                    errors: Number(suiteAttrs.errors || 0),
                    skipped: Number(suiteAttrs.skipped || 0),
                    testcases,
                  };
                });

              const totals = suites.reduce((acc, suite) => ({
                tests: acc.tests + suite.tests,
                failures: acc.failures + suite.failures,
                errors: acc.errors + suite.errors,
                skipped: acc.skipped + suite.skipped,
              }), { tests: 0, failures: 0, errors: 0, skipped: 0 });

              const statusLabel = { passed: 'PASS', skipped: 'SKIP', failed: 'FAIL', error: 'ERROR' };
              const maxRowsPerSuite = 80;
              const markdown = suites.map((suite) => {
                const className = suite.name.split('.').pop();
                const visibleTestcases = suite.testcases.slice(0, maxRowsPerSuite);
                const rows = visibleTestcases
                  .map((testcase) => `- [${statusLabel[testcase.status]}] \`${testcase.name}\``)
                  .join('\n');
                const hiddenCount = Math.max(suite.testcases.length - visibleTestcases.length, 0);
                return [
                  `<details${suite.failures || suite.errors ? ' open' : ''}>`,
                  `<summary><strong>${className}</strong> (${suite.tests} tests, ${suite.skipped} skipped)</summary>`,
                  '',
                  rows || '- _No scenario names found in this suite._',
                  hiddenCount > 0 ? `\n_${hiddenCount} additional scenarios are available in the browsable HTML report._` : '',
                  '',
                  '</details>',
                ].join('\n');
              }).join('\n\n');

              return { totals, markdown };
            }

            const scenarios = scenarioRows();
            const passCount = Math.max(
              scenarios.totals.tests - scenarios.totals.failures - scenarios.totals.errors - scenarios.totals.skipped,
              0
            );
            const body = [
              marker,
              `## ${passed ? 'Passed' : 'Failed'}: PR test results`,
              '',
              `- Commit: \`${context.payload.pull_request.head.sha}\``,
              `- Command: \`./gradlew :coordinator-server:test :coordinator-server:build --no-daemon\``,
              `- Exit code: \`${exitCode}\``,
              `- Run: ${runUrl}`,
              `- Test HTML report: [Open browsable report](${htmlReportUrl})`,
              `- Scenario totals: ${passCount} passed, ${scenarios.totals.failures} failed, ${scenarios.totals.errors} errored, ${scenarios.totals.skipped} skipped`,
              '',
              '### Scenario Tests',
              '',
              scenarios.markdown,
              '',
              '<details>',
              '<summary>Last 80 log lines</summary>',
              '',
              '```text',
              logTail.slice(-12000),
              '```',
              '</details>',
            ].join('\n');

            fs.mkdirSync('pr-test-result-comment', { recursive: true });
            fs.writeFileSync('pr-test-result-comment/body.md', body);

      - name: Upload PR test result comment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-pr-test-comment
          path: pr-test-result-comment/body.md
          if-no-files-found: error
          retention-days: 1

      - name: Fail if coordinator tests failed
        if: always()
        shell: bash
        run: |
          test "${{ steps.gradle_test.outputs.exit_code }}" = "0"

  post_test_result:
    if: always() && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    needs: test
    permissions:
      actions: read
      issues: write
      pull-requests: write
    steps:
      - name: Download prepared PR test result comment
        uses: actions/download-artifact@v4
        with:
          name: coordinator-pr-test-comment
          path: pr-test-result-comment

      - name: Post PR test result
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const marker = '<!-- pr-test-results -->';
            const body = fs.readFileSync('pr-test-result-comment/body.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const previous = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body?.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
