name: Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish, for example 0.2.0"
        required: true
        default: "0.2.0"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_CENTRAL_SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.MAVEN_CENTRAL_SIGNING_KEY_ID }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_CENTRAL_SIGNING_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Java 24
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "24"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          configured="$(sed -n 's/^projectVersion=//p' gradle.properties)"
          if [ "${configured}" != "${{ inputs.version }}" ]; then
            echo "gradle.properties projectVersion=${configured}, workflow input version=${{ inputs.version }}"
            exit 1
          fi

      - name: Validate Maven Central secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${ORG_GRADLE_PROJECT_mavenCentralUsername}" || { echo "MAVEN_CENTRAL_USERNAME is required"; exit 1; }
          test -n "${ORG_GRADLE_PROJECT_mavenCentralPassword}" || { echo "MAVEN_CENTRAL_PASSWORD is required"; exit 1; }
          test -n "${ORG_GRADLE_PROJECT_signingInMemoryKey}" || { echo "MAVEN_CENTRAL_SIGNING_KEY is required"; exit 1; }

      - name: Run release tests
        run: ./gradlew :redisstream-core:test :redisstream-spring-boot-starter:test --no-daemon

      - name: Publish libraries to Maven Central
        run: |
          ./gradlew \
            :redisstream-core:publishAndReleaseToMavenCentral \
            :redisstream-spring-boot-starter:publishAndReleaseToMavenCentral \
            --no-daemon
