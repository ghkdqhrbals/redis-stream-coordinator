name: Design docs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/workflows/design-docs.yml"
      - ".github/scripts/render_design_docs.py"
  push:
    branches: [main, unstable]
    paths:
      - ".github/workflows/design-docs.yml"
      - ".github/scripts/render_design_docs.py"
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Branch or ref that contains Markdown design documents"
        required: false
        default: "design-docs"

permissions:
  contents: read

concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Resolve deployment target
        id: target
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || 'design-docs' }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            destination="design-docs/pr-${PR_NUMBER}/${HEAD_SHA}"
          else
            destination="design-docs/latest"
          fi

          {
            echo "source_ref=${SOURCE_REF}"
            echo "destination=${destination}"
            echo "url=https://${REPOSITORY_OWNER}.github.io/${REPOSITORY_NAME}/${destination}/index.html"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout renderer
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Checkout Markdown design docs
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.target.outputs.source_ref }}
          path: design-docs-source
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Markdown renderer
        run: |
          python -m pip install --upgrade pip
          python -m pip install Markdown

      - name: Render Markdown to HTML
        run: |
          python .github/scripts/render_design_docs.py design-docs-source public-design-docs

      - name: Publish Design HTML
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public-design-docs
          destination_dir: ${{ steps.target.outputs.destination }}
          keep_files: true
          commit_message: "Publish design docs for ${{ steps.target.outputs.source_ref }}"

      - name: Post design docs preview
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- design-docs-preview -->';
            const body = [
              marker,
              '## Design docs preview',
              '',
              `- Source: \`${{ steps.target.outputs.source_ref }}\``,
              `- Links: [HTML design docs](${{ steps.target.outputs.url }}) / [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const previous = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body?.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
