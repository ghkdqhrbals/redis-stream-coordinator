name: Design docs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/workflows/design-docs.yml"
      - ".github/scripts/render_design_docs.py"
      - ".github/scripts/test_render_design_docs.py"
      - "docs/PRD.md"
      - "docs/ko/**/*.md"
      - "docs/openapi/**/*.yaml"
      - "docs/openapi/**/*.yml"
      - "docs/openapi/**/*.json"
      - "docs/prd/**/*.md"
      - "docs/operations-runbook.md"
      - "docs/testing.md"
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Branch or ref that contains Markdown design documents to publish"
        required: false
        default: "design-docs"

permissions:
  contents: read

concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      source_ref: ${{ steps.target.outputs.source_ref }}
      destination: ${{ steps.target.outputs.destination }}
      url: ${{ steps.target.outputs.url }}
    steps:
      - name: Resolve deployment target
        id: target
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || 'design-docs' }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            destination="design-docs/pr-${PR_NUMBER}/${HEAD_SHA}"
          else
            destination="design-docs/latest"
          fi

          {
            echo "source_ref=${SOURCE_REF}"
            echo "destination=${destination}"
            echo "url=https://${REPOSITORY_OWNER}.github.io/${REPOSITORY_NAME}/${destination}/index.html"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout renderer
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Checkout Markdown design docs
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.target.outputs.source_ref }}
          path: design-docs-source
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Markdown renderer
        run: |
          python -m pip install --upgrade pip
          python -m pip install Markdown

      - name: Run renderer unit tests
        run: |
          python .github/scripts/test_render_design_docs.py

      - name: Render Markdown to HTML
        run: |
          python .github/scripts/render_design_docs.py design-docs-source public-design-docs

      - name: Upload rendered Design HTML
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-design-docs-html
          path: public-design-docs
          if-no-files-found: error
          retention-days: 1

  publish:
    if: github.event_name == 'workflow_dispatch' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download rendered Design HTML
        uses: actions/download-artifact@v4
        with:
          name: coordinator-design-docs-html
          path: public-design-docs

      - name: Checkout GitHub Pages branch
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages-site
          fetch-depth: 0

      - name: Publish Design HTML
        shell: bash
        env:
          DESTINATION: ${{ needs.build.outputs.destination }}
          SOURCE_REF: ${{ needs.build.outputs.source_ref }}
        run: |
          set -euo pipefail

          rm -rf "gh-pages-site/${DESTINATION}"
          mkdir -p "gh-pages-site/${DESTINATION}"
          cp -a public-design-docs/. "gh-pages-site/${DESTINATION}/"
          touch gh-pages-site/.nojekyll

          cd gh-pages-site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A ".nojekyll" "${DESTINATION}"
          if git diff --cached --quiet; then
            echo "No design docs changes to publish."
            exit 0
          fi

          git commit -m "Publish design docs for ${SOURCE_REF}"
          git push

  post_render_result:
    if: always() && needs.build.result == 'success' && github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: build
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Post design docs render result
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- design-docs-preview -->';
            const body = [
              marker,
              '## Design docs render',
              '',
              `- Source: \`${{ needs.build.outputs.source_ref }}\``,
              `- Result: Rendered HTML was uploaded as the \`coordinator-design-docs-html\` artifact.`,
              `- Publish: Manual only via the \`Design docs\` workflow_dispatch run.`,
              `- Links: [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const previous = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body?.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
