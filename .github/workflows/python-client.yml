name: Python client

on:
  pull_request:
    paths:
      - "clients/python/**"
      - ".github/workflows/python-client.yml"
  push:
    branches:
      - main
      - unstable
      - feature/coordinator
    paths:
      - "clients/python/**"
      - ".github/workflows/python-client.yml"

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e clients/python

      - name: Run unit tests
        env:
          RSC_REAL_REDIS_URL: redis://127.0.0.1:6379
        run: python -m unittest discover -s clients/python/tests

      - name: Optional integration tests are env-gated
        run: |
          echo "Set RSC_PYTHON_INTEGRATION=1 with RSC_COORDINATOR_BASE_URL, RSC_REDIS_URL, RSC_STREAM_PREFIX, and RSC_CONSUMER_GROUP to run coordinator integration tests."
