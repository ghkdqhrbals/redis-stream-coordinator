name: PR test result comments

on:
  workflow_run:
    workflows: ["PR test results"]
    types: [completed]

permissions:
  actions: read
  issues: write
  pull-requests: write

jobs:
  post_test_result:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.head_repository.full_name != github.repository && github.event.workflow_run.conclusion != 'skipped' && github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Download prepared PR test result comment
        uses: actions/download-artifact@v4
        with:
          name: coordinator-pr-test-comment
          path: pr-test-result-comment
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Post PR test result
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const pr = context.payload.workflow_run.pull_requests?.[0];
            if (!pr) {
              core.notice('Skipping PR test result comment because the completed workflow has no associated pull request.');
              return;
            }

            const body = fs.readFileSync('pr-test-result-comment/body.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
