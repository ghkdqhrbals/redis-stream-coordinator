services:
  redis-node-1:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --port
      - "7001"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --protected-mode
      - "no"
      - --bind
      - 0.0.0.0
      - --cluster-announce-port
      - "7001"
      - --cluster-announce-bus-port
      - "17001"
      - --cluster-announce-hostname
      - 127.0.0.1
      - --cluster-preferred-endpoint-type
      - hostname
    ports:
      - "7001:7001"
      - "17001:17001"
    volumes:
      - redis-node-1-data:/data
    networks:
      - redis-cluster

  redis-node-2:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --port
      - "7002"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --protected-mode
      - "no"
      - --bind
      - 0.0.0.0
      - --cluster-announce-port
      - "7002"
      - --cluster-announce-bus-port
      - "17002"
      - --cluster-announce-hostname
      - 127.0.0.1
      - --cluster-preferred-endpoint-type
      - hostname
    ports:
      - "7002:7002"
      - "17002:17002"
    volumes:
      - redis-node-2-data:/data
    networks:
      - redis-cluster

  redis-node-3:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --port
      - "7003"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --protected-mode
      - "no"
      - --bind
      - 0.0.0.0
      - --cluster-announce-port
      - "7003"
      - --cluster-announce-bus-port
      - "17003"
      - --cluster-announce-hostname
      - 127.0.0.1
      - --cluster-preferred-endpoint-type
      - hostname
    ports:
      - "7003:7003"
      - "17003:17003"
    volumes:
      - redis-node-3-data:/data
    networks:
      - redis-cluster

  redis-cluster-init:
    image: redis:7.4-alpine
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until redis-cli -h redis-node-1 -p 7001 ping >/dev/null 2>&1; do sleep 1; done
        until redis-cli -h redis-node-2 -p 7002 ping >/dev/null 2>&1; do sleep 1; done
        until redis-cli -h redis-node-3 -p 7003 ping >/dev/null 2>&1; do sleep 1; done
        if redis-cli -h redis-node-1 -p 7001 cluster info | grep -q 'cluster_state:ok'; then
          echo "Redis cluster already initialized"
          exit 0
        fi
        yes yes | redis-cli --cluster create \
          redis-node-1:7001 \
          redis-node-2:7002 \
          redis-node-3:7003 \
          --cluster-replicas 0
    networks:
      - redis-cluster

networks:
  redis-cluster:
    name: redis-stream-coordinator-cluster

volumes:
  redis-node-1-data:
  redis-node-2-data:
  redis-node-3-data:
