services:
  e2e-redis-node-1:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --port
      - "7101"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "no"
      - --save
      - ""
      - --protected-mode
      - "no"
      - --bind
      - 0.0.0.0
      - --cluster-announce-port
      - "7101"
      - --cluster-announce-bus-port
      - "17101"
      - --cluster-announce-hostname
      - 127.0.0.1
      - --cluster-preferred-endpoint-type
      - hostname
    ports:
      - "7101:7101"
      - "17101:17101"
    tmpfs:
      - /data:size=32m
    networks:
      - redis-cluster-e2e

  e2e-redis-node-2:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --port
      - "7102"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "no"
      - --save
      - ""
      - --protected-mode
      - "no"
      - --bind
      - 0.0.0.0
      - --cluster-announce-port
      - "7102"
      - --cluster-announce-bus-port
      - "17102"
      - --cluster-announce-hostname
      - 127.0.0.1
      - --cluster-preferred-endpoint-type
      - hostname
    ports:
      - "7102:7102"
      - "17102:17102"
    tmpfs:
      - /data:size=32m
    networks:
      - redis-cluster-e2e

  e2e-redis-node-3:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --port
      - "7103"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "no"
      - --save
      - ""
      - --protected-mode
      - "no"
      - --bind
      - 0.0.0.0
      - --cluster-announce-port
      - "7103"
      - --cluster-announce-bus-port
      - "17103"
      - --cluster-announce-hostname
      - 127.0.0.1
      - --cluster-preferred-endpoint-type
      - hostname
    ports:
      - "7103:7103"
      - "17103:17103"
    tmpfs:
      - /data:size=32m
    networks:
      - redis-cluster-e2e

  e2e-redis-cluster-init:
    image: redis:7.4-alpine
    depends_on:
      - e2e-redis-node-1
      - e2e-redis-node-2
      - e2e-redis-node-3
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until redis-cli -h e2e-redis-node-1 -p 7101 ping >/dev/null 2>&1; do sleep 1; done
        until redis-cli -h e2e-redis-node-2 -p 7102 ping >/dev/null 2>&1; do sleep 1; done
        until redis-cli -h e2e-redis-node-3 -p 7103 ping >/dev/null 2>&1; do sleep 1; done
        if redis-cli -h e2e-redis-node-1 -p 7101 cluster info | grep -q 'cluster_state:ok'; then
          echo "Redis cluster already initialized"
          exit 0
        fi
        yes yes | redis-cli --cluster create \
          e2e-redis-node-1:7101 \
          e2e-redis-node-2:7102 \
          e2e-redis-node-3:7103 \
          --cluster-replicas 0
    networks:
      - redis-cluster-e2e

networks:
  redis-cluster-e2e:
    name: redis-stream-coordinator-e2e-cluster
