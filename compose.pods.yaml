services:
  pod-redis-node-1:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --port
      - "6379"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "no"
      - --save
      - ""
      - --protected-mode
      - "no"
      - --bind
      - 0.0.0.0
      - --cluster-announce-port
      - "6379"
      - --cluster-announce-bus-port
      - "16379"
      - --cluster-announce-hostname
      - pod-redis-node-1
      - --cluster-preferred-endpoint-type
      - hostname
    ports:
      - "7201:6379"
    tmpfs:
      - /data:size=32m
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 2s
      timeout: 1s
      retries: 30
    networks:
      - redis-stream-pods

  pod-redis-node-2:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --port
      - "6379"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "no"
      - --save
      - ""
      - --protected-mode
      - "no"
      - --bind
      - 0.0.0.0
      - --cluster-announce-port
      - "6379"
      - --cluster-announce-bus-port
      - "16379"
      - --cluster-announce-hostname
      - pod-redis-node-2
      - --cluster-preferred-endpoint-type
      - hostname
    ports:
      - "7202:6379"
    tmpfs:
      - /data:size=32m
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 2s
      timeout: 1s
      retries: 30
    networks:
      - redis-stream-pods

  pod-redis-node-3:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --port
      - "6379"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "no"
      - --save
      - ""
      - --protected-mode
      - "no"
      - --bind
      - 0.0.0.0
      - --cluster-announce-port
      - "6379"
      - --cluster-announce-bus-port
      - "16379"
      - --cluster-announce-hostname
      - pod-redis-node-3
      - --cluster-preferred-endpoint-type
      - hostname
    ports:
      - "7203:6379"
    tmpfs:
      - /data:size=32m
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 2s
      timeout: 1s
      retries: 30
    networks:
      - redis-stream-pods

  pod-redis-cluster-init:
    image: redis:7.4-alpine
    depends_on:
      pod-redis-node-1:
        condition: service_healthy
      pod-redis-node-2:
        condition: service_healthy
      pod-redis-node-3:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        if redis-cli -h pod-redis-node-1 -p 6379 cluster info | grep -q 'cluster_state:ok'; then
          echo "Redis cluster already initialized"
          exit 0
        fi
        yes yes | redis-cli --cluster create \
          pod-redis-node-1:6379 \
          pod-redis-node-2:6379 \
          pod-redis-node-3:6379 \
          --cluster-replicas 0
    networks:
      - redis-stream-pods

  coordinator:
    image: redis-stream-coordinator/coordinator:local
    build:
      context: .
      args:
        APP_TASK: :coordinator-server:bootJar
        APP_LIB_DIR: coordinator-server/build/libs
    depends_on:
      pod-redis-cluster-init:
        condition: service_completed_successfully
    environment:
      SPRING_DATA_REDIS_CLUSTER_NODES: pod-redis-node-1:6379,pod-redis-node-2:6379,pod-redis-node-3:6379
      COORDINATOR_ID: docker-coordinator
      COORDINATOR_STORE_TYPE: redis
      COORDINATOR_STREAMS_PROVISIONING_ENABLED: "true"
      COORDINATOR_DEFAULTS_INITIAL_SHARD_COUNT: "6"
      COORDINATOR_DEFAULTS_CONSUMER_MAX_CONCURRENCY: "6"
      REDIS_STREAM_COORDINATOR_ADMIN_PASSWORD: password
      MANAGEMENT_HEALTH_DISKSPACE_ENABLED: "false"
    ports:
      - "8080:8080"
    tmpfs:
      - /tmp:size=128m
    networks:
      - redis-stream-pods

  coordinator-group-init:
    image: redis:7.4-alpine
    depends_on:
      coordinator:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until wget -qO- http://coordinator:8080/actuator/info >/dev/null 2>&1; do
          sleep 1
        done
        if wget -qO- \
          --header='Authorization: Basic YWRtaW46cGFzc3dvcmQ=' \
          http://coordinator:8080/coord/v1/streams/demo.orders/groups/demo-workers >/dev/null 2>&1; then
          echo "Coordinator group already exists"
          exit 0
        fi
        wget -qO- \
          --header='Content-Type: application/json' \
          --header='Authorization: Basic YWRtaW46cGFzc3dvcmQ=' \
          --post-data='{"initialShardCount":6,"hashAlgorithm":"MURMUR3_32","consumerConcurrencyPolicy":{"defaultMaxConcurrency":6},"requestedBy":"compose.pods","reason":"local pod smoke"}' \
          http://coordinator:8080/coord/v1/streams/demo.orders/groups/demo-workers
        echo
        echo "Coordinator group initialized"
    networks:
      - redis-stream-pods

  consumer-pod-1:
    image: redis-stream-coordinator/consumer-pod:local
    build:
      context: .
      args:
        APP_TASK: :samples:consumer-pod:bootJar
        APP_LIB_DIR: samples/consumer-pod/build/libs
    depends_on:
      coordinator-group-init:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: "18081"
      REDIS_CLUSTER_NODE_1: pod-redis-node-1:6379
      REDIS_CLUSTER_NODE_2: pod-redis-node-2:6379
      REDIS_CLUSTER_NODE_3: pod-redis-node-3:6379
      COORDINATOR_BASE_URL: http://coordinator:8080
      STREAM_PREFIX: demo.orders
      CONSUMER_GROUP: demo-workers
      CONSUMER_MEMBER_ID: consumer-pod-1
      CONSUMER_MEMBER_NAME: consumer-pod-1
      CONSUMER_RUNTIME_MAX_CONCURRENCY: "4"
      COORDINATOR_USERNAME: admin
      COORDINATOR_PASSWORD: password
      MANAGEMENT_HEALTH_DISKSPACE_ENABLED: "false"
    ports:
      - "18081:18081"
    tmpfs:
      - /tmp:size=128m
    networks:
      - redis-stream-pods

  consumer-pod-2:
    image: redis-stream-coordinator/consumer-pod:local
    build:
      context: .
      args:
        APP_TASK: :samples:consumer-pod:bootJar
        APP_LIB_DIR: samples/consumer-pod/build/libs
    depends_on:
      coordinator-group-init:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: "18082"
      REDIS_CLUSTER_NODE_1: pod-redis-node-1:6379
      REDIS_CLUSTER_NODE_2: pod-redis-node-2:6379
      REDIS_CLUSTER_NODE_3: pod-redis-node-3:6379
      COORDINATOR_BASE_URL: http://coordinator:8080
      STREAM_PREFIX: demo.orders
      CONSUMER_GROUP: demo-workers
      CONSUMER_MEMBER_ID: consumer-pod-2
      CONSUMER_MEMBER_NAME: consumer-pod-2
      CONSUMER_RUNTIME_MAX_CONCURRENCY: "4"
      COORDINATOR_USERNAME: admin
      COORDINATOR_PASSWORD: password
      MANAGEMENT_HEALTH_DISKSPACE_ENABLED: "false"
    ports:
      - "18082:18082"
    tmpfs:
      - /tmp:size=128m
    networks:
      - redis-stream-pods

  publisher-pod:
    image: redis-stream-coordinator/publisher-pod:local
    build:
      context: .
      args:
        APP_TASK: :samples:publisher-pod:bootJar
        APP_LIB_DIR: samples/publisher-pod/build/libs
    depends_on:
      coordinator-group-init:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: "18090"
      REDIS_CLUSTER_NODE_1: pod-redis-node-1:6379
      REDIS_CLUSTER_NODE_2: pod-redis-node-2:6379
      REDIS_CLUSTER_NODE_3: pod-redis-node-3:6379
      COORDINATOR_BASE_URL: http://coordinator:8080
      STREAM_PREFIX: demo.orders
      CONSUMER_GROUP: demo-workers
      COORDINATOR_USERNAME: admin
      COORDINATOR_PASSWORD: password
      PUBLISHER_AUTO_PUBLISH_ENABLED: "true"
      PUBLISHER_PUBLISH_INTERVAL_MS: "1000"
      MANAGEMENT_HEALTH_DISKSPACE_ENABLED: "false"
    ports:
      - "18090:18090"
    tmpfs:
      - /tmp:size=128m
    networks:
      - redis-stream-pods

networks:
  redis-stream-pods:
    name: redis-stream-coordinator-pods
