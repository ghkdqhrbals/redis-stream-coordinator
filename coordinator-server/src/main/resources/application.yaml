server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      access: unrestricted

springdoc:
  api-docs:
    enabled: true
  paths-to-exclude:
    - /scalar
    - /scalar/**
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha

scalar:
  enabled: true
  path: /scalar
  url: /v3/api-docs
  page-title: Redis Stream Coordinator API
  layout: modern
  theme: default
  document-download-type: both
  operation-title-source: summary
  tag-sorter: alpha
  operation-sorter: method
  show-operation-id: true
  hide-test-request-button: false

spring:
  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configtree:/run/secrets/}

coordinator:
  api:
    admin-password: ${REDIS_STREAM_COORDINATOR_ADMIN_PASSWORD:password}
  coordination:
    state-mutex:
      ttl-ms: 30000
      acquire-timeout-ms: 5000
      retry-interval-ms: 100
  health:
    redis-timeout-ms: 300
